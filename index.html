<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASE | Premium Varsity Jacket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        <header>
            <h1 class="logo">EASE</h1>
            <p class="subtitle">ISU CABAGAN EDITION v2.0</p>
        </header>

        <section class="features-section">
            <div class="feature-tag">Premium Nylon</div>
            <div class="feature-tag">Gold Embroidery</div>
            <div class="feature-tag">Water Resistant</div>
        </section>

        <div class="order-form">
            <label>Select Size</label>
            <select id="sizeSelect">
                <option value="S">Small (S)</option>
                <option value="M">Medium (M)</option>
                <option value="L">Large (L)</option>
                <option value="XL">Extra Large (XL)</option>
            </select>

            <label>Campus / Department</label>
            <input type="text" id="deptInput" placeholder="e.g. ISU - BSIT">
        </div>

        <div class="payment-section">
            <p>Payment Method:</p>
            <div class="pay-options">
                <button id="btnCash" class="pay-btn active" onclick="togglePayment('cash')">CASH</button>
                <button id="btnQR" class="pay-btn" onclick="togglePayment('qr')">QR CODE</button>
            </div>

            <div id="qrDisplay" class="qr-box">
                <p>Scan to Pay via GCash</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=EASE-PAY-ISU" alt="QR Code">
                <p class="gcash-num">0917-XXX-XXXX</p>
            </div>
        </div>

        <button class="main-submit" onclick="processOrder()">SUBMIT ORDER</button>

        <div id="statusTerminal" class="terminal">
            <span class="cursor">></span> Ready for new order...
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
